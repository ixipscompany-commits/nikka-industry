<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ページが見つかりませんでした。有限会社NIKKA公式サイト">
  <title>404 Not Found | 有限会社NIKKA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Noto+Sans+JP:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="error404">

  <div class="scroll-bg" aria-hidden="true">
    <div class="scroll-bg__wash"></div>
    <div class="scroll-bg__orb scroll-bg__orb--1"></div>
    <div class="scroll-bg__orb scroll-bg__orb--2"></div>
  </div>

  <header class="site-header is-scrolled">
    <div class="container site-header__inner">
      <a href="index.html" class="site-logo" data-i18n-attr="aria-label:logo.ariaHome">
        <span class="site-logo__mark">NIKKA</span>
        <span class="site-logo__sub" data-i18n="common.companyName">有限会社NIKKA</span>
      </a>
    </div>
    <nav class="site-nav" data-i18n-attr="aria-label:nav.main">
      <ul class="site-nav__list">
        <li><a href="index.html#about" data-i18n="nav.about">About</a></li>
        <li><a href="index.html#businesses" data-i18n="nav.businesses">Businesses</a></li>
        <li><a href="index.html#news" data-i18n="nav.news">News</a></li>
        <li><a href="contact.html" data-i18n="nav.contact">Contact</a></li>
      </ul>
    </nav>
    <div class="site-header__aside">
      <div class="site-header__rabbit" aria-hidden="true"></div>
      <div class="lang-switcher" role="group" data-i18n-attr="aria-label:lang.switcher">
        <button type="button" class="lang-switcher__btn is-active" data-lang="ja" aria-pressed="true">JA</button>
        <button type="button" class="lang-switcher__btn" data-lang="en" aria-pressed="false">EN</button>
        <button type="button" class="lang-switcher__btn" data-lang="zh" aria-pressed="false">中文</button>
      </div>
    </div>
  </header>

  <main class="page-main">
    <section class="section section--page section--error">
      <div class="container container--narrow error-page">
        <p class="error-page__code" data-i18n="error404.code">404</p>
        <h1 class="error-page__title" data-i18n="error404.title">ページが見つかりません</h1>
        <p class="error-page__message" data-i18n="error404.message">
          お探しのページは移動または削除された可能性があります。URLをご確認いただくか、トップページからお探しください。
        </p>
        <div class="error-page__actions">
          <a href="index.html" class="btn btn--primary">
            <span data-i18n="error404.ctaHome">トップへ戻る</span>
            <span class="btn__icon" aria-hidden="true">→</span>
          </a>
          <a href="contact.html" class="btn btn--ghost" data-i18n="error404.ctaContact">お問い合わせ</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container site-footer__inner">
      <p class="site-footer__copy">&copy; <span id="year"></span> <span data-i18n="footer.copyright">有限会社NIKKA All Rights Reserved.</span></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/lenis@1.1.18/dist/lenis.min.js" defer></script>
  <script src="js/i18n.js" defer></script>
  <script src="js/header-roll.js" defer></script>
  <script>
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>
</body>
</html>
